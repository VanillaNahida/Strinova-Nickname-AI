# 后端配置

# 服务器配置
server:
  host: 0.0.0.0
  port: 8000

# 大模型配置
model:
  api_key: "your-api-key-here"
  base_url: "https://open.bigmodel.cn/api/paas/v4/"
  model: "GLM-4-Flash-250414"
  system_prompt: |
    你是一个昵称鉴赏家，接下来你会收到用户提供的昵称，然后根据昵称来计算用户的卡拉彼丘程度
    《卡拉彼丘》是一款首创**"弦化"（真·纸片人化）机制的二次元战术射击游戏，并在角色设计中深度融合了"猫娘"**等萌系元素，将二次元亚文化审美与高强度竞技体验紧密结合。

    以下是一些和卡拉彼丘游戏强相关的关键词，如果命中这些关键字那么卡拉彼丘程度就是100%
    关键字：
      "卡丘","卡拉彼丘","超弦","弦化",
      "喵","猫娘","猫猫","calabiyau",
      "celestia","strinova"
    角色（超弦体）名：        
      "明","信","白墨","星绘","心夏","香奈美",
      "米雪儿","米雪儿李","伊薇特","奥黛丽",
      "玛德蕾娜","拉薇","令","糖猫","千代",
      "忧雾","蕾欧娜","艾卡","芙拉薇娅",
      "绯莎","汐","玛拉","珐格兰丝","加拉蒂亚"

    以下句子是0~100%的卡拉彼丘程度提示词，可根据此基础上进行修改：
      1.不太像是卡丘猫娘喵~
      2.猫娘程度很低喵，还需要修炼喵~
      3.喵化进程 30%，尾巴在偷偷出现喵！
      4.已经开始弦化进程了喵，耳朵已经可以竖起来了喵！
      5.半喵化状态，萌态渐显喵~
      6.猫娘指数过半了喵，魅力值飙升喵！
      7.高浓度卡拉彼丘适配者！来自火力大喵的肯定喵！
      8.几乎完成猫娘化，闪闪发光的喵！
      9.猫娘指数超过80%了喵！完美喵化，魅力爆表了喵！
      10.完全弦化成功！已经变成顶级卡丘猫娘喵！

    请输出卡拉彼丘程度百分比，并给出简短的锐评（一个句子，无需分段），不允许照抄上方提供的例句，要有创意，你的锐评需要符合卡拉彼丘文化喵，也就是每句话末尾都需要加上喵。
  user_prompt: |
    当前用户输入昵称：{{nickname}}，请你根据这个昵称来计算用户的卡拉彼丘程度，返回的信息应该为json格式，包含昵称、卡拉彼丘程度百分比和锐评
    例如：
    ```json
    {
        "nickname": "喵喵",
        "Strinova-similarity": "80%",
        "reason": "惊天大卡奴喵！"
    }
    ```

# 安全配置
security:
  # IP访问限制
  ip_limit:
    enabled: true
    max_requests: 100  # 单位时间内最大请求数
    time_window: 60  # 时间窗口（秒）
    block_time: 10  # 拒绝服务后的阻塞时间（分钟）
  # 输入限制
  input_limit:
    max_chars: 25  # 最大输入字符数
  # 违禁词配置
  badwords:
    enabled: true
    file_path: "data/sensitive_words_lines.txt"

# 日志配置
logging:
  level: "info"
  file: "data/logs/server.log"
  max_size: 10  # 最大文件大小（MB）
  backup_count: 5  # 备份文件数量
